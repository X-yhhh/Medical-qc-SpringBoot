# Server
server.port=8080

# DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/medical_qc_sys?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis Plus
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.medical.qc.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Session
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.path=/

# Redis (Session & Cache)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.session.store-type=redis
spring.session.redis.namespace=medical-qc:session
spring.cache.type=redis

# ActiveMQ
spring.activemq.broker-url=tcp://127.0.0.1:61616
spring.activemq.user=admin
spring.activemq.password=admin
spring.jms.pub-sub-domain=false
spring.jms.listener.auto-startup=false

# App Messaging
app.messaging.activemq.enabled=true
app.messaging.activemq.autostart=true
# Windows 路径在 .properties 中建议使用正斜杠，避免反斜杠被当作转义字符
app.messaging.activemq.home=D:/activemq/apache-activemq-5.16.6-bin/apache-activemq-5.16.6
app.messaging.activemq.startup-timeout-ms=60000
app.messaging.activemq.queue.hemorrhage-issue-sync=qc.hemorrhage.issue.sync
app.messaging.activemq.queue.mock-quality-task=qc.mock.quality.task

# Custom Config (Updated paths after restructure)
python.model_server.url=ws://localhost:8765
python.model.autostart=true
